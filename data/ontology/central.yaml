version: "1.0"

quantities:
  # MASS
  payload_mass:
    dimensionality: "[mass]"
    canonical_unit: "kg"
    aliases: ["mass", "design_payload_mass"]
    domain_class: "MASS_POS"

  # GEOMETRY
  hole_diameter:
    dimensionality: "[length]"
    canonical_unit: "m"
    aliases: ["diameter", "bore_diameter", "mount_hole_diameter"]
    domain_class: "LENGTH_POS"

  plate_thickness:
    dimensionality: "[length]"
    canonical_unit: "m"
    aliases: ["thickness", "wall_thickness"]
    domain_class: "LENGTH_POS"

  edge_radius:
    dimensionality: "[length]"
    canonical_unit: "m"
    aliases: ["edge_radius_min", "fillet_radius", "corner_radius"]
    domain_class: "LENGTH_POS"

  bend_radius:
    dimensionality: "[length]"
    canonical_unit: "m"
    aliases: ["inside_bend_radius", "bend_rad", "radius"]
    domain_class: "LENGTH_POS"

  leg_length:
    dimensionality: "[length]"
    canonical_unit: "m"
    aliases: ["bracket_leg_length_horizontal", "bracket_leg_length_vertical", "arm_length", "flange_length"]
    domain_class: "LENGTH_POS"

  edge_distance:
    dimensionality: "[length]"
    canonical_unit: "m"
    aliases: ["min_edge_distance", "min_end_distance", "end_distance"]
    domain_class: "LENGTH_POS"

  clearance_diameter:
    dimensionality: "[length]"
    canonical_unit: "m"
    aliases: ["tool_access_clearance_diameter", "access_clearance"]
    domain_class: "LENGTH_POS"

  deflection:
    dimensionality: "[length]"
    canonical_unit: "m"
    aliases: ["max_tip_deflection", "tip_deflection", "max_deflection"]
    domain_class: "LENGTH_NONNEG"

  permanent_deformation:
    dimensionality: "[length]"
    canonical_unit: "m"
    aliases: ["permanent_set", "residual_deflection", "plastic_deformation"]
    domain_class: "LENGTH_NONNEG"

  coating_thickness:
    dimensionality: "[length]"
    canonical_unit: "m"
    aliases: ["plating_thickness", "surface_coating"]
    domain_class: "LENGTH_NONNEG"
    max_cap: 1.0e-3  # 1 mm - reasonable max for coatings

  hole_spacing:
    dimensionality: "[length]"
    canonical_unit: "m"
    aliases: ["mount_hole_spacing_center_to_center", "hole_pitch", "spacing"]
    domain_class: "LENGTH_POS"

  moment_arm:
    dimensionality: "[length]"
    canonical_unit: "m"
    aliases: ["lever_arm", "eccentricity", "moment_arm_length"]
    domain_class: "LENGTH_POS"

  hole_diameter_change:
    dimensionality: "[length]"
    canonical_unit: "m"
    aliases: ["hole_growth", "hole_elongation", "hole_dilation"]
    domain_class: "LENGTH_NONNEG"

  # FACTORS
  safety_factor:
    dimensionality: "dimensionless"
    canonical_unit: ""
    aliases: ["factor", "load_factor"]
    domain_class: "FACTOR_GE1"
    max_cap: 10  # Sane upper bound to prevent infinite witness space

  static_safety_factor:
    dimensionality: "dimensionless"
    canonical_unit: ""
    aliases: ["static_safety_factor_yield", "static_sf"]
    domain_class: "FACTOR_GE1"
    max_cap: 10

  shock_safety_factor:
    dimensionality: "dimensionless"
    canonical_unit: ""
    aliases: ["dynamic_safety_factor", "impact_safety_factor", "shock_sf"]
    domain_class: "FACTOR_GE1"
    max_cap: 10

  shock_factor:
    dimensionality: "dimensionless"
    canonical_unit: ""
    aliases: ["shock_load_factor", "impact_factor", "dynamic_factor"]
    domain_class: "FACTOR_GE1"
    max_cap: 20  # Sane upper bound for shock factors

  dynamic_load_factor:
    dimensionality: "dimensionless"
    canonical_unit: ""
    aliases: ["impact_multiplier", "shock_multiplier"]
    domain_class: "FACTOR_GE1"
    max_cap: 50

  host_pullout_safety_factor:
    dimensionality: "dimensionless"
    canonical_unit: ""
    aliases: ["fastener_safety_factor", "pullout_sf", "pullout_safety_factor"]
    domain_class: "FACTOR_GE1"
    max_cap: 10

  # TORQUE
  installation_torque:
    dimensionality: "[mass] * [length] ** 2 / [time] ** 2"
    canonical_unit: "N*m"
    aliases: ["torque", "tightening_torque", "bolt_torque"]
    domain_class: "TORQUE_POS"

  # LOAD
  static_force:
    dimensionality: "[mass] * [length] / [time] ** 2"
    canonical_unit: "N"
    aliases: ["design_static_force", "applied_force"]
    domain_class: "FORCE_NONNEG"

  shock_force:
    dimensionality: "[mass] * [length] / [time] ** 2"
    canonical_unit: "N"
    aliases: ["design_shock_force", "impact_force", "dynamic_force"]
    domain_class: "FORCE_NONNEG"

  deflection_test_load:
    dimensionality: "[mass] * [length] / [time] ** 2"
    canonical_unit: "N"
    aliases: ["test_load", "deflection_load", "service_test_load"]
    domain_class: "FORCE_NONNEG"

  proof_test_load:
    dimensionality: "[mass] * [length] / [time] ** 2"
    canonical_unit: "N"
    aliases: ["proof_load", "applied_load", "overload_test"]
    domain_class: "FORCE_NONNEG"

  # MATERIAL
  yield_strength:
    dimensionality: "[mass] / [length] / [time] ** 2"
    canonical_unit: "Pa"
    aliases: ["yield_strength_min", "material_yield", "fy"]
    domain_class: "STRESS_POS"
    max_cap: 2.0e9  # 2 GPa - above most engineering steels/alloys

  von_mises_stress:
    dimensionality: "[mass] / [length] / [time] ** 2"
    canonical_unit: "Pa"
    aliases:
      - "max_von_mises_stress"
      - "max_von_mises_stress_static"
      - "max_von_mises_stress_shock"
      - "von_mises"
      - "vm_stress"
    domain_class: "STRESS_POS"
    max_cap: 2.0e9

  allowable_stress:
    dimensionality: "[mass] / [length] / [time] ** 2"
    canonical_unit: "Pa"
    aliases:
      - "design_allowable_stress"
      - "allowable_von_mises_stress"
      - "allowable_stress_limit"
    domain_class: "STRESS_POS"
    max_cap: 2.0e9

  friction_coefficient:
    dimensionality: "dimensionless"
    canonical_unit: ""
    aliases: ["assumed_friction_coefficient_joint", "mu", "cof"]
    domain_class: "FRICTION"
    max_cap: 1.0  # Physical limit for static friction

  # TIME
  duration:
    dimensionality: "[time]"
    canonical_unit: "s"
    aliases:
      [
        "shock_duration_assumed",
        "exposure_time",
        "test_duration",
        "vibration_duration",
        "load_hold_duration",
        "hold_time",
      ]
    domain_class: "TIME_POS"

  salt_spray_duration:
    dimensionality: "[time]"
    canonical_unit: "s"
    aliases: ["salt_spray_neutral", "corrosion_test_time"]
    domain_class: "TIME_POS"

  # ANGLE
  bend_angle:
    dimensionality: "dimensionless"
    canonical_unit: ""
    aliases: ["forming_angle", "fold_angle"]
    domain_class: "ANGLE"

  # MANUFACTURING
  fastener_count:
    dimensionality: "dimensionless"
    canonical_unit: ""
    aliases: ["number_of_fasteners", "bolt_count", "screw_count"]
    domain_class: "COUNT_POS"

  # ENVIRONMENT
  gravity:
    dimensionality: "[length] / [time] ** 2"
    canonical_unit: "m/s^2"
    aliases: ["design_gravity", "g", "gravitational_acceleration"]
    domain_class: "PHYS_CONST_POS"

regimes:
  - id: normal
    label: "Normal"
    description: "Normal operating conditions"
  - id: startup
    label: "Startup"
    description: "System startup phase"
  - id: shutdown
    label: "Shutdown"
    description: "System shutdown phase"
  - id: installation
    label: "Installation"
    description: "Installation/mounting phase"
  - id: maintenance
    label: "Maintenance"
    description: "Maintenance operations"
  - id: fault
    label: "Fault"
    description: "Fault conditions"
  - id: overload
    label: "Overload"
    description: "Overload conditions"
  - id: emergency
    label: "Emergency"
    description: "Emergency conditions"
  - id: storage_transport
    label: "Storage/Transport"
    description: "Storage/transport phase"

entity_kinds:
  - id: system
    label: "System"
    description: "Top-level system being designed"
  - id: payload
    label: "Payload"
    description: "Load or item being supported"
  - id: host
    label: "Host"
    description: "Structure system mounts to"
  - id: interface
    label: "Interface"
    description: "Connection point between entities"
