name: LLM PR Review

on:
  # NOTE: Using pull_request for bootstrap. After merging, switch to pull_request_target
  # with ref: ${{ github.event.repository.default_branch }} for security.
  # pull_request_target runs trusted code from base branch, but the reviewer doesn't
  # exist on main yet, so we must use pull_request temporarily.
  #
  # SECURITY: During bootstrap, we add a guard that refuses to run if the reviewer
  # code or workflow itself is modified in the PR (defense-in-depth).
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled]

jobs:
  # Security check: detect if reviewer code is modified in the PR
  # This runs BEFORE any PR code is checked out or executed
  security-check:
    name: Security Check
    runs-on: ubuntu-latest
    # Only run for non-draft, non-fork PRs with llm_review label
    # Label provides opt-in privacy control - only repo collaborators can apply labels
    if: |
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.fork == false &&
      contains(github.event.pull_request.labels.*.name, 'llm_review')
    outputs:
      safe_to_run: ${{ steps.check.outputs.safe }}
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Check for modified reviewer code
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get list of changed files in the PR using GitHub API (no checkout needed)
          CHANGED_FILES=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files --paginate --jq '.[].filename')
          
          # Check if any reviewer code or workflow files are modified
          if echo "$CHANGED_FILES" | grep -qE '^\.github/(llm-pr-reviewer/|workflows/llm_pr_review\.yml)'; then
            echo "::warning::LLM review SKIPPED for security: PR modifies reviewer code or workflow."
            echo "::warning::This is a defense-in-depth measure during bootstrap phase."
            echo "::warning::The reviewer will run on PRs that don't modify its own code."
            echo "safe=false" >> $GITHUB_OUTPUT
          else
            echo "safe=true" >> $GITHUB_OUTPUT
          fi

  review:
    name: LLM PR Review
    runs-on: ubuntu-latest
    needs: security-check
    # Only run if security check passed (reviewer code not modified)
    if: needs.security-check.outputs.safe_to_run == 'true'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: .github/llm-pr-reviewer/package-lock.json

      - name: Install dependencies
        working-directory: .github/llm-pr-reviewer
        run: npm ci

      - name: Build
        working-directory: .github/llm-pr-reviewer
        run: npm run build

      - name: Run LLM PR Review
        working-directory: .github/llm-pr-reviewer
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          REVIEW_MODEL: gpt-5.2
          REVIEW_EFFORT: high
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          # GITHUB_STEP_SUMMARY is automatically available as a built-in env var
        run: node dist/pr_reviewer.js

      - name: Remove llm_review label
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Remove the label to prevent re-runs on subsequent pushes
          # The review is tied to the commit SHA, so re-apply label for new review
          gh pr edit ${{ github.event.pull_request.number }} --remove-label llm_review || true

  test:
    name: LLM PR Reviewer Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: .github/llm-pr-reviewer/package-lock.json

      - name: Install dependencies
        working-directory: .github/llm-pr-reviewer
        run: npm ci

      - name: Run tests
        working-directory: .github/llm-pr-reviewer
        run: npm test
